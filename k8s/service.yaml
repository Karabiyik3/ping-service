apiVersion: v1
kind: Service
metadata:
  name: ping-service
  labels:
    app: ping-service
spec:
  type: NodePort
  selector:
    app: ping-service
  ports:
    - port: 80          # service port inside the cluster
      targetPort: 8080  # container port
      nodePort: 30080   # external port on the node (30000-32767 range)
      protocol: TCP
